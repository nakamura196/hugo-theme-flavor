<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        {{- range .THead }}
          {{- range .}}
            <th{{ with .Alignment }} style="text-align: {{ . }}"{{ end }}>{{ .Text }}</th>
          {{- end }}
        {{- end }}
      </tr>
    </thead>
    <tbody>
      {{- range .TBody }}
      <tr>
        {{- range . }}
          <td{{ with .Alignment }} style="text-align: {{ . }}"{{ end }}>{{ .Text }}</td>
        {{- end }}
      </tr>
      {{- end }}
    </tbody>
  </table>
</div>
